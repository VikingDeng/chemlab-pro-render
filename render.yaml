services:
  - type: web
    name: chemlab-pro
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: LLM_PROVIDER
        value: mimo
      - key: LLM_API_URL
        value: https://token-plan-cn.xiaomimimo.com/v1
      - key: LLM_MODEL
        value: mimo-v2.5
      - key: LLM_API_KEY
        sync: false
